seed: 42
device: auto

data:
  # New raw-dataset mode. Set dataset_path to one raw file or a directory of files.
  # Supported: .parquet, .csv, .npz, .npy, .pt, .pth.
  dataset_path: C:\Users\HP\Documents\ISRO\datasets
  # Use these when raw data is already split into train/test folders or files.
  raw_train_path: datasets/train.parquet
  raw_val_path: datasets/validation.parquet
  raw_test_path: datasets/test.parquet
  dataset_format: auto
  directory_mode: auto
  labels_path: null
  sample_id_column: target_id
  time_column: time
  flux_column: detrended_flux
  quality_column: quality
  label_column: label_x
  sequence_length: 2048
  sequence_stride: 2048
  preprocessing:
    remove_bad_quality: true
    good_quality_value: 0
    min_points: 16
    normalization: standard
    outlier_clip:
      enabled: true
      sigma: 5.0
    sequence_mode: pad_or_window
    pad_short_sequences: true
    padding_strategy: zero
  splits:
    ratios:
      train: 0.7
      val: 0.15
      test: 0.15
    val_from_train_ratio: 0.15
    cache_path: outputs/splits/splits.json
    reuse_cached: true

  # Backward-compatible pre-split mode. Used when dataset_path is null.
  train:
    format: npz
    path: data/train.npz
  val:
    format: npz
    path: data/val.npz
  test:
    format: npz
    path: data/test.npz
  label_column: label_x
  batch_size: 32
  num_workers: 0
  pin_memory: true

model:
  name: cnn_transformer
  input_channels: 1
  num_classes: 1
  cnn_channels: [32, 64, 128]
  kernel_size: 7
  dropout: 0.25
  lstm_hidden: 128
  lstm_layers: 1
  transformer_dim: 128
  transformer_heads: 4
  transformer_layers: 3
  transformer_ff_dim: 256

training:
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 8
  grad_clip_norm: 1.0
  mixed_precision: true
  loss:
    name: focal
    alpha: 0.75
    gamma: 2.0
    pos_weight: null
  checkpoint_dir: outputs/checkpoints
  tensorboard_dir: outputs/tensorboard

evaluation:
  output_dir: outputs/evaluation
  threshold: 0.5

inference:
  mc_dropout_samples: 30
  threshold: 0.5
  top_k_explanation_points: 50
  tta:
    enabled: false
    noise_std: 0.005
    samples: 8
